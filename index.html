<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고초형 카카오톡 상담</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #F5F5F5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: #FFFFFF;
    border-radius: 16px;
    border: 1px solid rgba(0,0,0,0.06);
    padding: 48px 28px 36px;
    text-align: center;
    max-width: 340px;
    width: calc(100% - 40px);
    opacity: 0;
    transform: scale(0.92);
    animation: scaleIn 0.5s ease forwards;
  }
  .kakao-logo { margin-bottom: 24px; }
  .title {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.55;
    color: #1A1A1A;
    margin-bottom: 8px;
  }
  .sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }
  .sub .num {
    font-weight: 600;
    color: #16A34A;
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    transition: background 0.3s ease, color 0.3s ease;
  }
  .meta {
    font-size: 12px;
    color: #AAA;
    margin-bottom: 16px;
  }
  .meta .num {
    font-weight: 600;
    color: #16A34A;
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    transition: background 0.3s ease, color 0.3s ease;
  }
  .bar-track {
    background: #E8E8E8;
    border-radius: 100px;
    height: 4px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .bar-fill {
    background: #2563EB;
    height: 100%;
    width: 0%;
    border-radius: 100px;
  }
  .cta {
    font-size: 14px;
    color: #1A1A1A;
    line-height: 1.65;
  }
  @keyframes scaleIn {
    0% { opacity: 0; transform: scale(0.92); }
    100% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="kakao-logo">
    <svg width="48" height="48" viewBox="0 0 48 48">
      <rect width="48" height="48" rx="12" fill="#FEE500"/>
      <path d="M24 13c-7.18 0-13 4.47-13 10 0 3.57 2.38 6.71 5.95 8.48l-1.52 5.55c-.13.46.4.84.8.57l6.6-4.34c.38.03.77.05 1.17.05 7.18 0 13-4.47 13-10s-5.82-10-13-10z" fill="#3C1E1E"/>
    </svg>
  </div>
  <p class="title">고초형 공식 카카오톡 채널로<br>이동중입니다.</p>
  <p class="sub">현재 <span class="num" id="ppl">7명</span>의 상담이 진행중입니다.</p>
  <p class="meta">최근 한달 내 문의 <span class="num" id="cnt">278건</span></p>
  <div class="bar-track">
    <div class="bar-fill" id="bar"></div>
  </div>
  <p class="cta">입장 후 지원하시는 기업명을<br>카톡으로 말씀해주세요.</p>
</div>

<script>
  var KAKAO_URL = 'https://open.kakao.com/me/gocho3';
  var bar = document.getElementById('bar');
  var ppl = document.getElementById('ppl');
  var cnt = document.getElementById('cnt');

  // 로딩 추적
  var loaded = { pixel: false, page: false };
  var barTarget = 0;
  var barCurrent = 0;
  var barRAF = null;

  // 프로그레스바: 부드럽게 연속 진행 (끊김 없음)
  function smoothBar() {
    var diff = barTarget - barCurrent;
    if (Math.abs(diff) < 0.15) {
      barCurrent = barTarget;
      bar.style.width = barCurrent + '%';
      if (barTarget < 100) barRAF = requestAnimationFrame(smoothBar);
      return;
    }
    barCurrent += diff * 0.035;
    bar.style.width = barCurrent + '%';
    barRAF = requestAnimationFrame(smoothBar);
  }

  function setBarTarget(t) {
    barTarget = t;
    if (barRAF) cancelAnimationFrame(barRAF);
    barRAF = requestAnimationFrame(smoothBar);
  }

  // 색상 플래시 숫자 변경
  function flashChange(el, newText) {
    el.style.background = '#16A34A';
    el.style.color = '#FFFFFF';
    setTimeout(function() {
      el.textContent = newText;
      setTimeout(function() {
        el.style.background = 'transparent';
        el.style.color = '#16A34A';
      }, 400);
    }, 300);
  }

  // 1초 후 숫자 색상 플래시 변경
  setTimeout(function() {
    flashChange(ppl, '8명');
    flashChange(cnt, '279건');
  }, 1000);

  // 부드러운 연속 프로그레스
  // 0.5초 후 시작 → 30%
  setTimeout(function() { setBarTarget(30); }, 500);

  // 페이지 로드 완료 → 60%
  window.addEventListener('load', function() {
    loaded.page = true;
    setBarTarget(60);
    checkDone();
  });

  // 픽셀 로드 감지 → 90%
  var pixelCheck = setInterval(function() {
    if (typeof fbq !== 'undefined' && fbq.loaded) {
      loaded.pixel = true;
      clearInterval(pixelCheck);
      setBarTarget(90);
      checkDone();
    }
  }, 100);

  // 2.5초 안에 픽셀 안 잡히면 강제 진행
  setTimeout(function() {
    if (!loaded.pixel) {
      loaded.pixel = true;
      clearInterval(pixelCheck);
      setBarTarget(90);
      checkDone();
    }
  }, 2500);

  // 전부 로드되면 100% → 리다이렉트
  var redirected = false;
  function checkDone() {
    if (loaded.page && loaded.pixel && !redirected) {
      redirected = true;
      setTimeout(function() {
        setBarTarget(100);
        setTimeout(function() {
          window.location.href = KAKAO_URL;
        }, 600);
      }, 200);
    }
  }

  // 최종 안전장치: 4초 후 무조건 리다이렉트
  setTimeout(function() {
    if (!redirected) {
      redirected = true;
      bar.style.width = '100%';
      window.location.href = KAKAO_URL;
    }
  }, 4000);
</script>

</body>
</html>
