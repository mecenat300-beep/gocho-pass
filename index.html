<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고초형 카카오톡 상담</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<!-- Meta Pixel Code -->

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: #F5F5F5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: #FFFFFF;
    border-radius: 24px;
    padding: 48px 24px 40px;
    text-align: center;
    max-width: 340px;
    width: calc(100% - 40px);
    opacity: 0;
    transform: scale(0.96);
    animation: scaleIn 0.5s ease forwards;
  }
  .logo { margin-bottom: 28px; }
  .title {
    font-size: 18px;
    font-weight: 700;
    color: #191F28;
    line-height: 1.55;
    margin-bottom: 32px;
    letter-spacing: -0.4px;
  }
  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 36px;
  }
  .stat-box {
    flex: 1;
    background: #F2F4F6;
    border-radius: 16px;
    padding: 18px 12px;
  }
  .stat-label {
    font-size: 13px;
    color: #8B95A1;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .stat-num {
    font-size: 32px;
    font-weight: 700;
    color: #3182F6;
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    transition: background 0.3s ease, color 0.3s ease;
  }
  .bar-track {
    background: #F2F4F6;
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 36px;
  }
  .bar-fill {
    background: #3182F6;
    height: 100%;
    width: 0%;
    border-radius: 100px;
  }
  .cta {
    font-size: 15px;
    color: #4E5968;
    line-height: 1.7;
    letter-spacing: -0.2px;
    font-weight: 500;
  }
  .kakao-btn {
    display: none;
    margin-top: 28px;
    background: #FEE500;
    color: #3C1E1E;
    border: none;
    border-radius: 12px;
    padding: 16px 24px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    width: 100%;
    letter-spacing: -0.3px;
    transition: transform 0.15s ease;
  }
  .kakao-btn:active {
    transform: scale(0.97);
  }
  .kakao-btn.show {
    display: block;
    animation: fadeUp 0.4s ease forwards;
  }
  @keyframes scaleIn {
    0% { opacity: 0; transform: scale(0.96); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <rect width="56" height="56" rx="18" fill="#FEE500"/>
      <path d="M28 15c-8.37 0-15.17 5.21-15.17 11.67 0 4.16 2.78 7.82 6.94 9.89l-1.77 6.47c-.15.54.47.98.93.67l7.7-5.07c.45.04.9.06 1.37.06 8.37 0 15.17-5.21 15.17-11.67S36.37 15 28 15z" fill="#3C1E1E"/>
    </svg>
  </div>
  <p class="title">고초형 카카오톡 채널로<br>이동중입니다.</p>
  <div class="stats">
    <div class="stat-box">
      <p class="stat-label">실시간 상담중</p>
      <p class="stat-num" id="ppl">7명</p>
    </div>
    <div class="stat-box">
      <p class="stat-label">최근 한달 문의</p>
      <p class="stat-num" id="cnt">278명</p>
    </div>
  </div>
  <div class="bar-track">
    <div class="bar-fill" id="bar"></div>
  </div>
  <p class="cta">입장 후 지원하시는 기업명을<br>카톡으로 말씀해주세요.</p>
  <button class="kakao-btn" id="kakaoBtn" onclick="goKakao()">카카오톡 열기</button>
</div>

<script>
  var KAKAO_URL = 'https://open.kakao.com/me/gocho3';
  var MIN_DISPLAY = 2000;
  var pageStart = Date.now();
  var bar = document.getElementById('bar');
  var ppl = document.getElementById('ppl');
  var cnt = document.getElementById('cnt');
  var kakaoBtn = document.getElementById('kakaoBtn');

  // --- 프로그레스바 ---
  var barTarget = 0;
  var barCurrent = 0;
  var barRAF = null;

  function smoothBar() {
    var diff = barTarget - barCurrent;
    if (Math.abs(diff) < 0.15) {
      barCurrent = barTarget;
      bar.style.width = barCurrent + '%';
      if (barTarget < 100) barRAF = requestAnimationFrame(smoothBar);
      return;
    }
    barCurrent += diff * 0.025;
    bar.style.width = barCurrent + '%';
    barRAF = requestAnimationFrame(smoothBar);
  }

  function setBarTarget(t) {
    barTarget = t;
    if (barRAF) cancelAnimationFrame(barRAF);
    barRAF = requestAnimationFrame(smoothBar);
  }

  // --- 숫자 플래시 ---
  function flashChange(el, newText) {
    el.style.background = '#22C55E';
    el.style.color = '#FFFFFF';
    setTimeout(function() {
      el.textContent = newText;
      setTimeout(function() {
        el.style.background = 'transparent';
        el.style.color = '#3182F6';
      }, 400);
    }, 300);
  }

  setTimeout(function() {
    flashChange(ppl, '8명');
    flashChange(cnt, '279명');
  }, 1000);

  // --- 프로그레스 단계 ---
  setTimeout(function() { setBarTarget(20); }, 300);
  setTimeout(function() { setBarTarget(45); }, 800);
  setTimeout(function() { setBarTarget(70); }, 1300);
  setTimeout(function() { setBarTarget(90); }, 1800);

  // --- 픽셀 확실히 전송 후 리다이렉트 ---
  var pixelSent = false;
  var pageDone = false;

  function sendPixelLead() {
    if (typeof fbq !== 'undefined') {
      fbq('track', 'Lead');
      // sendBeacon 폴백: 픽셀 이미지 요청이 날아갈 시간 확보
      pixelSent = true;
    } else {
      pixelSent = true; // 픽셀 로드 실패해도 진행
    }
    tryRedirect();
  }

  window.addEventListener('load', function() {
    pageDone = true;
    // 픽셀 로드 대기 후 Lead 이벤트 발송
    var checkPixel = setInterval(function() {
      if (typeof fbq !== 'undefined' && fbq.loaded) {
        clearInterval(checkPixel);
        sendPixelLead();
      }
    }, 100);
    // 2초 안에 픽셀 안 잡히면 강제 진행
    setTimeout(function() {
      clearInterval(checkPixel);
      if (!pixelSent) sendPixelLead();
    }, 2000);
  });

  // --- 리다이렉트 (replace로 히스토리 안 남김) ---
  var redirected = false;

  function goKakao() {
    window.location.replace(KAKAO_URL);
  }

  function tryRedirect() {
    if (!pageDone || !pixelSent || redirected) return;
    redirected = true;
    var elapsed = Date.now() - pageStart;
    var remaining = Math.max(0, MIN_DISPLAY - elapsed);

    setTimeout(function() {
      setBarTarget(100);

      // 픽셀 전송 여유 시간 200ms 확보 후 리다이렉트
      setTimeout(function() {
        // 자동 리다이렉트 시도 (replace로 뒤로가기 문제 해결)
        window.location.replace(KAKAO_URL);

        // 1.5초 후에도 페이지에 남아있으면 = 자동 리다이렉트 실패
        // 버튼을 보여줌
        setTimeout(function() {
          kakaoBtn.classList.add('show');
        }, 1500);
      }, 500);
    }, remaining);
  }

  // --- 최종 안전장치 ---
  setTimeout(function() {
    if (!redirected) {
      redirected = true;
      if (typeof fbq !== 'undefined') fbq('track', 'Lead');
      bar.style.width = '100%';
      window.location.replace(KAKAO_URL);
      setTimeout(function() {
        kakaoBtn.classList.add('show');
      }, 1500);
    }
  }, 5000);
</script>

</body>
</html>
